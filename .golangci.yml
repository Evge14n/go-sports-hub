linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - gocritic
    - gofmt
    - misspell
    - bodyclose
    - noctx

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

run:
  timeout: 3m

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
